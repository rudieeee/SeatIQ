<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SeatIQ Simple Frontend</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;700;800&family=IBM+Plex+Mono:wght@400;600&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <section class="hero">
      <p class="chip">SeatIQ Demo</p>
      <h1>Library Seat Booking</h1>
      <p class="subtitle">Register roll number, pick floor, choose seat, and release when leaving.</p>
    </section>

    <section class="panel grid-two">
      <div>
        <label for="apiBase">Backend URL</label>
        <input id="apiBase" type="text" value="http://127.0.0.1:5001" />
      </div>
      <button id="refreshFloorsBtn" class="btn subtle">Refresh Floors</button>
    </section>

    <section class="panel">
      <h2>1. Register</h2>
      <div class="grid-two">
        <div>
          <label for="rollNo">Roll Number</label>
          <input id="rollNo" type="text" placeholder="1024030389" />
        </div>
        <button id="registerBtn" class="btn">Register</button>
      </div>
    </section>

    <section class="panel">
      <h2>2. Select Floor & Seat</h2>
      <div class="grid-two">
        <div>
          <label for="floorSelect">Floor</label>
          <select id="floorSelect"></select>
        </div>
        <div>
          <label for="seatNumber">Seat Number (1-500)</label>
          <input id="seatNumber" type="number" min="1" max="500" value="1" />
        </div>
      </div>
      <p id="seatPreview" class="seat-preview">Seat ID: -</p>
      <div class="actions">
        <button id="bookBtn" class="btn">Book Seat</button>
        <button id="releaseBtn" class="btn danger">Release My Seat</button>
      </div>
    </section>

    <section class="panel">
      <h2>Floor Availability</h2>
      <div id="floorCards" class="cards"></div>
    </section>

    <section class="panel">
      <h2>Active Bookings</h2>
      <button id="refreshBookingsBtn" class="btn subtle">Refresh Bookings</button>
      <pre id="bookingsOutput">[]</pre>
    </section>

    <section class="panel status-wrap">
      <h2>Response</h2>
      <pre id="statusBox">Ready.</pre>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
